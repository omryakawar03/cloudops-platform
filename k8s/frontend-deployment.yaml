apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-frontend
  namespace: cloudops
  labels:
    app: cloudops-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudops-frontend
  template:
    metadata:
      labels:
        app: cloudops-frontend
    spec:
      containers:
        - name: frontend
          image: ${FRONTEND_IMAGE}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: "150m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"