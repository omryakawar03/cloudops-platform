apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-backend
  namespace: cloudops
  labels:
    app: cloudops-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudops-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: cloudops-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: ${BACKEND_IMAGE}
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 3001

          # Non-sensitive env variables
          env:
            - name: APP_NAME
              value: "CloudOps"
            - name: APP_ENV
              value: "production"
            - name: APP_VERSION
              value: "1.0.0"
            - name: PORT
              value: "3001"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: cloudops-backend-secret
                  key: MONGO_URI              
 

          resources:
            requests:
              cpu: "300m"
              memory: "300Mi"
            limits:
              cpu: "600m"
              memory: "600Mi"

          livenessProbe:
            httpGet:
              path: /core/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /core/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3