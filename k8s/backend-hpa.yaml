apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloudops-backend-hpa
  namespace: cloudops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudops-backend
  minReplicas: 2
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60