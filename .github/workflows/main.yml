name: CloudOps CI/CD Advanced

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'

env:
  BACKEND_IMAGE: yourdockerhub/cloudops-backend
  FRONTEND_IMAGE: yourdockerhub/cloudops-frontend

jobs:

  detect:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v3

      - id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend:
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Sonar Scan (code quality)
      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Docker Login
      - name: Login Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker Image
      - name: Build Backend Image
        run: |
          docker build \
            -t $BACKEND_IMAGE:${{ github.run_number }} \
            -t $BACKEND_IMAGE:latest \
            ./backend

      # Trivy Scan Image
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.run_number }}
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # Push Image
      - name: Push Backend Image
        run: |
          docker push $BACKEND_IMAGE:${{ github.run_number }}
          docker push $BACKEND_IMAGE:latest

      # AWS Config
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name your-cluster-name

      # Deploy
      - name: Deploy Backend
        run: |
          kubectl set image deployment/cloudops-backend \
          cloudops-backend=$BACKEND_IMAGE:${{ github.run_number }} \
          -n cloudops

          kubectl rollout status deployment/cloudops-backend -n cloudops


  frontend:
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Login Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Image
        run: |
          docker build \
            -t $FRONTEND_IMAGE:${{ github.run_number }} \
            -t $FRONTEND_IMAGE:latest \
            ./frontend

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.run_number }}
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend Image
        run: |
          docker push $FRONTEND_IMAGE:${{ github.run_number }}
          docker push $FRONTEND_IMAGE:latest

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name your-cluster-name

      - name: Deploy Frontend
        run: |
          kubectl set image deployment/cloudops-frontend \
          cloudops-frontend=$FRONTEND_IMAGE:${{ github.run_number }} \
          -n cloudops

          kubectl rollout status deployment/cloudops-frontend -n cloudops
